---
layout: default
title: random photos
---

<!-- Site title -->
<div class="mt-6 text-center">
  <p class="text-xs text-gray-500">{{ site.title }}</p>
</div>

<!-- Photo feed -->
<div id="photo-feed" class="space-y-12 pt-10"></div>

<!-- Sentinel -->
<div id="sentinel" class="py-8 text-center text-xs text-gray-400">
  <span id="sentinel-label"></span>
</div>

<script>
  const photos = [
    {% for photo in site.data.photos %}
    {
      src: "{{ photo.src }}",
      alt: "{{ photo.alt }}",
      caption: "{{ photo.caption }}",
      date: "{{ photo.date }}"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  const BATCH = 5;
  let loaded = 0;
  let isLoading = false;

  function createPhotoEl(photo) {
    const wrap = document.createElement('div');
    wrap.style.opacity = '0';
    wrap.style.transform = 'translateY(16px)';
    wrap.style.transition = 'opacity 0.4s ease, transform 0.4s ease';

    const hasCaption = photo.caption && photo.caption.trim() !== '';
    const hasDate = photo.date && photo.date.trim() !== '';
    const showMeta = hasCaption || hasDate;

    wrap.innerHTML = `
      <div class="flex justify-center items-center">
        <img src="${photo.src}" alt="${photo.alt}" loading="lazy" style="max-width:100%;height:auto;" />
      </div>
      ${showMeta ? `
        <div class="text-center mt-2 flex flex-col items-center gap-1">
          ${hasDate ? `<p class="text-xs text-gray-400">${photo.date}</p>` : ''}
          ${hasCaption ? `<p class="text-xs text-gray-500">${photo.caption}</p>` : ''}
        </div>
      ` : ''}
    `;

    const fadeObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0)';
          fadeObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05 });

    requestAnimationFrame(() => fadeObserver.observe(wrap));
    return wrap;
  }

  function loadBatch() {
    if (isLoading || loaded >= photos.length) return;
    isLoading = true;

    const feed = document.getElementById('photo-feed');
    const label = document.getElementById('sentinel-label');
    label.textContent = 'loading...';

    const batch = photos.slice(loaded, loaded + BATCH);

    setTimeout(() => {
      batch.forEach(photo => feed.appendChild(createPhotoEl(photo)));
      loaded += batch.length;

      if (loaded >= photos.length) {
        label.textContent = '— end —';
        sentinelObserver.disconnect();
      } else {
        label.textContent = '';
      }

      isLoading = false;
    }, 200);
  }

  const sentinelObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) loadBatch();
  }, { rootMargin: '200px' });

  window.addEventListener('load', () => {
    sentinelObserver.observe(document.getElementById('sentinel'));
    loadBatch();
  });
</script>
