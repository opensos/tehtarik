<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.15/dist/tailwind.min.css" rel="stylesheet">
  <!-- IBM Plex Mono -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Andale Mono, 'IBM Plex Mono', monospace;
    }
    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body class="bg-white">

  {{ content }}

</body>
<footer class="border-t border-zinc-200/40 py-6 dark:border-zinc-800/40">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-6 text-[11px] text-zinc-400">

    <p>
      © {{ site.time | date: "%Y" }} {{ site.title }}
    </p>

    <div class="flex gap-5">
      <a href="/privacy" class="hover:text-zinc-700 dark:hover:text-zinc-200 transition">
        Privacy
      </a>
      <a href="/terms" class="hover:text-zinc-700 dark:hover:text-zinc-200 transition">
        Terms
      </a>
      <a href="/contact" class="hover:text-zinc-700 dark:hover:text-zinc-200 transition">
        Contact
      </a>
    </div>

  </div>
</footer>
</html>
